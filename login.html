<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Sistem</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;

    background:
    linear-gradient(
        rgba(15,23,42,.45),
        rgba(37,99,235,.35)
    ),
    url('assets/img/bg.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:100%;
    max-width:500px;
}

.header{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.header h1{
    font-size:52px;
    font-weight:700;
}

.header p{
    color:#E2E8F0;
}

.login-card{
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:40px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.form-control{
    height:55px;
    border-radius:12px;
}

.btn-login{
    background:#1E3A8A;
    color:white;
    border:none;
    height:55px;
    border-radius:12px;
    font-weight:600;
}

.btn-login:hover{
    background:#172554;
}

</style>

</head>
<body>

<div class="login-container">

    <div class="header">
        <h1>Selamat Datang</h1>
        <p>Silahkan masuk ke Sistem</p>
    </div>

    <div class="login-card">

        <!-- Alert Box Dinamis untuk Menampilkan Pesan Sukses / Error -->
        <div id="statusAlert" class="alert d-none" role="alert"></div>

        <form id="formLogin" novalidate>

            <div class="mb-3">
                <label>Username atau Email</label>
                <input
                    type="text"
                    name="login"
                    id="login"
                    class="form-control"
                    required>
            </div>

            <div class="mb-4">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    class="form-control"
                    required>
            </div>

            <button
                type="submit"
                class="btn btn-login w-100"
                id="submitBtn">

                <span id="btnText">Login</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>

            </button>

        </form>

        <div class="text-center mt-3">
            Belum punya akun?
            <a href="index.html">Daftar</a>
        </div>

    </div>

</div>

<!-- JavaScript Integrasi Fetch API -->
<script>
document.getElementById('formLogin').addEventListener('submit', async function (e) {
    // Mencegah browser melakukan submit form tradisional (reload halaman)
    e.preventDefault();

    const form = e.target;
    const alertElement = document.getElementById('statusAlert');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    // Kumpulkan seluruh data form menjadi satu objek FormData
    const formData = new FormData(form);

    // Atur Status UI: Mengubah tombol ke mode Loading (Visual Feedback)
    submitBtn.disabled = true;
    btnText.textContent = "Sedang Memproses...";
    btnSpinner.classList.remove('d-none');
    alertElement.classList.add('d-none'); // Sembunyikan alert sebelumnya

    try {
        // Kirim request ke backend secara asinkronus menggunakan Fetch API
        const response = await fetch('login_process.php', {
            method: 'POST',
            body: formData
        });

        // Parse respons dari server menjadi objek JSON
        const data = await response.json();

        // Tampilkan feedback visual berbasis alert Bootstrap
        alertElement.classList.remove('d-none', 'alert-success', 'alert-danger');

        if (response.ok) {
            // Jika status HTTP adalah 200-299 (Login Berhasil)
            alertElement.classList.add('alert-success');
            alertElement.textContent = data.message;

            // Redirect ke dashboard setelah sebentar, supaya pesan sukses terlihat
            setTimeout(function () {
                window.location.href = data.redirect || 'dashboard.php';
            }, 800);

        } else {
            // Jika backend melempar error status (401, 400, 500, dst)
            alertElement.classList.add('alert-danger');
            alertElement.textContent = data.message || "Gagal melakukan login.";

            // Kembalikan tombol ke keadaan aktif semula (hanya jika gagal, karena jika
            // berhasil halaman akan segera redirect)
            submitBtn.disabled = false;
            btnText.textContent = "Login";
            btnSpinner.classList.add('d-none');
        }

    } catch (error) {
        // Menangani masalah hilangnya koneksi internet atau server crash
        alertElement.classList.remove('d-none', 'alert-success');
        alertElement.classList.add('alert-danger');
        alertElement.textContent = "Gagal menghubungi server. Periksa koneksi lokal Anda.";
        console.error("Fetch error:", error);

        submitBtn.disabled = false;
        btnText.textContent = "Login";
        btnSpinner.classList.add('d-none');
    }
});
</script>

</body>
</html>
