<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrasi Akun Praktikum</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;

    background:
    linear-gradient(
        rgba(15,23,42,0.45),
        rgba(37,99,235,0.35)
    ),
    url('assets/img/bg.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container-register{
    width:100%;
    max-width:550px;
}

.header-text{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.header-text h1{
    font-size:55px;
    font-weight:700;
    margin-bottom:10px;
}

.header-text p{
    font-size:18px;
    color:#E2E8F0;
}

.register-card{
    background:rgba(255,255,255,0.94);
    backdrop-filter:blur(10px);

    border:none;
    border-radius:25px;

    padding:40px;

    box-shadow:
    0 20px 45px rgba(0,0,0,0.25);
}

.form-label{
    font-weight:600;
    color:#0F172A;
}

.form-control{
    height:55px;
    border-radius:12px;
    border:1px solid #CBD5E1;
}

.form-control:focus{
    border-color:#2563EB;
    box-shadow:none;
}

.btn-register{
    height:55px;
    border:none;
    border-radius:12px;
    background:#1E3A8A;
    color:white;
    font-weight:600;
    font-size:18px;
}

.btn-register:hover{
    background:#172554;
}

.btn-register:disabled{
    background:#64748B;
    opacity:0.8;
}

.success-box{
    background:#DCFCE7;
    color:#166534;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
}

.error-box{
    background:#FEE2E2;
    color:#991B1B;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    font-weight:600;
    color:#2563EB;
}

</style>
</head>

<body>

<div class="container-register">

    <div class="header-text">
        <h1>Mulai Sekarang</h1>
        <p>Buat akun baru untuk mengakses sistem</p>
    </div>

    <div class="register-card">

        <div id="statusAlert" class="d-none"></div>

        <form id="formRegister" novalidate>

            <div class="mb-3">
                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Masukkan username"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Alamat Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="contoh@gmail.com"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Minimal 6 karakter"
                    required>
            </div>

            <button
                type="submit"
                class="btn btn-register w-100"
                id="submitBtn">

                <span id="btnText">Daftar Sekarang</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>

            </button>

        </form>

        <div class="login-link">
            Sudah punya akun?
            <a href="login.html">
                Login
            </a>
        </div>

    </div>

</div>

<script>

document.getElementById('formRegister')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const form = this;
    const formData = new FormData(form);
    const username = formData.get('username');

    const alertBox = document.getElementById('statusAlert');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    // Atur Status UI: Mengubah tombol ke mode Loading (mencegah double-submit)
    submitBtn.disabled = true;
    btnText.textContent = "Sedang Memproses...";
    btnSpinner.classList.remove('d-none');
    alertBox.classList.add('d-none');

    try{

        const response = await fetch(
            'register_process.php',
            {
                method:'POST',
                body:formData
            }
        );

        const data = await response.json();

        alertBox.classList.remove('d-none');

        if(response.ok && data.status === 'success'){

            alertBox.className = 'success-box';

            alertBox.innerHTML =
            `
            <strong>✅ Selamat, ${username}!</strong><br>
            Proses registrasi akun baru berhasil diselesaikan.
            `;

            form.reset();

        }else{

            alertBox.className = 'error-box';
            alertBox.innerHTML = data.message || 'Gagal melakukan registrasi.';

        }

    }catch(error){

        // Menangani masalah hilangnya koneksi internet, server crash,
        // atau response yang gagal di-parse sebagai JSON
        alertBox.classList.remove('d-none');
        alertBox.className = 'error-box';
        alertBox.innerHTML = 'Gagal menghubungi server. Periksa koneksi lokal Anda.';
        console.error("Fetch error:", error);

    }finally{

        // Kembalikan tombol ke keadaan aktif semula
        submitBtn.disabled = false;
        btnText.textContent = "Daftar Sekarang";
        btnSpinner.classList.add('d-none');

    }

});

</script>

</body>
</html>
